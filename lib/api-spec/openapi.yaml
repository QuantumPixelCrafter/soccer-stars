openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: FreeKick Gacha Card Game API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: inventory
  - name: shop
  - name: squad
  - name: market
  - name: daily-objective

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new account (auto-grants Free 11-Player Starter Pack)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthInput"
      responses:
        "201":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegistrationResult"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Username already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in to an existing account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out (invalidate session token)
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/daily-claim:
    post:
      operationId: dailyClaim
      tags: [auth]
      summary: Claim daily coin reward (200 coins, once per day)
      responses:
        "200":
          description: Coins awarded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyReward"
        "400":
          description: Already claimed today
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /inventory/balance:
    get:
      operationId: getBalance
      tags: [inventory]
      summary: Get current coin balance
      responses:
        "200":
          description: Balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BalanceResponse"

  /inventory/players:
    get:
      operationId: getPlayers
      tags: [inventory]
      summary: List all owned player cards with stats
      responses:
        "200":
          description: Player list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlayerCard"

  /inventory/summary:
    get:
      operationId: getInventorySummary
      tags: [inventory]
      summary: Get inventory summary (coins + card counts)
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventorySummary"

  /inventory/exchange/{inventoryId}:
    post:
      operationId: exchangeCard
      tags: [inventory]
      summary: Quick-sell a card for coins (value = floor(overall^2/70))
      parameters:
        - name: inventoryId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Card exchanged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExchangeResult"
        "404":
          description: Card not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Card is listed on market
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /shop/packs:
    get:
      operationId: getPacks
      tags: [shop]
      summary: List available packs
      responses:
        "200":
          description: Pack list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pack"

  /shop/buy:
    post:
      operationId: buyPack
      tags: [shop]
      summary: Purchase a pack
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuyPackInput"
      responses:
        "200":
          description: Pack opened
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PackOpenResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Insufficient coins
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /shop/nerf-preview:
    get:
      operationId: getNerfPreview
      tags: [shop]
      summary: Preview Universal Nerf Rule for a player
      parameters:
        - name: playerId
          in: query
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Nerf preview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NerfPreview"

  /squad/{squadType}:
    get:
      operationId: getSquad
      tags: [squad]
      summary: Get a squad (main or daily_objective)
      parameters:
        - name: squadType
          in: path
          required: true
          schema:
            type: string
            enum: [main, daily_objective]
      responses:
        "200":
          description: Squad data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Squad"

  /squad/{squadType}/slot:
    put:
      operationId: setSquadSlot
      tags: [squad]
      summary: Assign a player card to a formation slot
      parameters:
        - name: squadType
          in: path
          required: true
          schema:
            type: string
            enum: [main, daily_objective]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetSlotInput"
      responses:
        "200":
          description: Updated squad
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Squad"
        "422":
          description: Position incompatible
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /squad/{squadType}/slot/{slotKey}:
    delete:
      operationId: removeSquadSlot
      tags: [squad]
      summary: Remove a player from a formation slot
      parameters:
        - name: squadType
          in: path
          required: true
          schema:
            type: string
            enum: [main, daily_objective]
        - name: slotKey
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated squad
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Squad"

  /market:
    get:
      operationId: getMarket
      tags: [market]
      summary: List active market auctions
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: position
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Market listings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketPage"

  /market/my-listings:
    get:
      operationId: getMyListings
      tags: [market]
      summary: My active listings
      responses:
        "200":
          description: My listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MarketListing"

  /market/my-bids:
    get:
      operationId: getMyBids
      tags: [market]
      summary: Items where I am the current highest bidder
      responses:
        "200":
          description: My active bids
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MarketListing"

  /market/list:
    post:
      operationId: createListing
      tags: [market]
      summary: List a card for auction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateListingInput"
      responses:
        "201":
          description: Listing created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketListing"
        "422":
          description: Bid below minimum
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /market/bid/{listingId}:
    post:
      operationId: placeBid
      tags: [market]
      summary: Place a bid on a market listing
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlaceBidInput"
      responses:
        "200":
          description: Bid placed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketListing"
        "422":
          description: Bid too low or insufficient coins
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /market/cancel/{listingId}:
    delete:
      operationId: cancelListing
      tags: [market]
      summary: Cancel a listing (only if no bids)
      parameters:
        - name: listingId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Listing cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /daily-objective:
    get:
      operationId: getDailyObjective
      tags: [daily-objective]
      summary: Get today's daily objective formation and squad
      responses:
        "200":
          description: Daily objective data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyObjective"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        min_bid:
          type: integer

    SuccessResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
        message:
          type: string

    AuthInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [token, userId, username, coins]
      properties:
        token:
          type: string
        userId:
          type: integer
        username:
          type: string
        coins:
          type: integer

    RegistrationResult:
      type: object
      required: [token, userId, username, coins, message, starter_pack]
      properties:
        token:
          type: string
        userId:
          type: integer
        username:
          type: string
        coins:
          type: integer
        message:
          type: string
        starter_pack:
          type: array
          items:
            $ref: "#/components/schemas/PlayerCard"

    DailyReward:
      type: object
      required: [awarded, coins]
      properties:
        awarded:
          type: integer
        coins:
          type: integer

    BalanceResponse:
      type: object
      required: [coins]
      properties:
        coins:
          type: integer

    InventorySummary:
      type: object
      required: [coins, total_cards, goalkeepers, shooters]
      properties:
        coins:
          type: integer
        total_cards:
          type: integer
        goalkeepers:
          type: integer
        shooters:
          type: integer

    PlayerCard:
      type: object
      required: [id, inventory_id, name, initials, position, country, club, is_gk, overall, tactical_position, is_bench_pool, is_listed, acquired_at]
      properties:
        id:
          type: integer
        inventory_id:
          type: integer
        name:
          type: string
        initials:
          type: string
        position:
          type: string
        country:
          type: string
        club:
          type: string
        is_gk:
          type: boolean
        fk:
          type: ["integer", "null"]
        pk:
          type: ["integer", "null"]
        fks:
          type: ["integer", "null"]
        pks:
          type: ["integer", "null"]
        overall:
          type: integer
        tactical_position:
          type: string
        is_bench_pool:
          type: boolean
        is_listed:
          type: boolean
        acquired_at:
          type: string

    ExchangeResult:
      type: object
      required: [success, coins_earned, player_name, new_balance]
      properties:
        success:
          type: boolean
        coins_earned:
          type: integer
        player_name:
          type: string
        new_balance:
          type: integer

    Pack:
      type: object
      required: [id, name, description, cost, card_count]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        cost:
          type: integer
        card_count:
          type: integer

    BuyPackInput:
      type: object
      required: [packType]
      properties:
        packType:
          type: string

    PackOpenResult:
      type: object
      required: [players, remaining_coins, duplicate_inventory_ids]
      properties:
        players:
          type: array
          items:
            $ref: "#/components/schemas/PlayerCard"
        remaining_coins:
          type: integer
        duplicate_inventory_ids:
          type: array
          items:
            type: integer

    NerfPreview:
      type: object
      required: [player_id, name, original_role, used_as_role, effective_fk, effective_pk]
      properties:
        player_id:
          type: integer
        name:
          type: string
        original_role:
          type: string
        used_as_role:
          type: string
        effective_fk:
          type: ["number", "null"]
        effective_pk:
          type: ["number", "null"]

    SquadSlotPlayer:
      type: object
      required: [inventory_id, player_id, name, initials, overall, tactical_position, is_gk, club, country]
      properties:
        inventory_id:
          type: integer
        player_id:
          type: integer
        name:
          type: string
        initials:
          type: string
        overall:
          type: integer
        tactical_position:
          type: string
        is_gk:
          type: boolean
        fk:
          type: ["integer", "null"]
        pk:
          type: ["integer", "null"]
        fks:
          type: ["integer", "null"]
        pks:
          type: ["integer", "null"]
        club:
          type: string
        country:
          type: string
        is_bench_pool:
          type: boolean

    Squad:
      type: object
      required: [squad_type, squad_id, slots]
      properties:
        squad_type:
          type: string
        squad_id:
          type: integer
        team_ovr:
          type: ["integer", "null"]
        slots:
          type: object
          additionalProperties:
            oneOf:
              - $ref: "#/components/schemas/SquadSlotPlayer"
              - type: "null"

    SetSlotInput:
      type: object
      required: [slot_key, inventory_id]
      properties:
        slot_key:
          type: string
        inventory_id:
          type: integer

    MarketListing:
      type: object
      required: [id, seller_id, seller_username, inventory_id, player_id, player_name, player_initials, player_overall, player_position, player_club, player_country, player_is_gk, starting_bid, current_bid, expires_at, created_at, quick_sell_value]
      properties:
        id:
          type: integer
        seller_id:
          type: integer
        seller_username:
          type: string
        inventory_id:
          type: integer
        player_id:
          type: integer
        player_name:
          type: string
        player_initials:
          type: string
        player_overall:
          type: integer
        player_position:
          type: string
        player_club:
          type: string
        player_country:
          type: string
        player_is_gk:
          type: integer
        starting_bid:
          type: integer
        current_bid:
          type: integer
        current_bidder_id:
          type: ["integer", "null"]
        current_bidder_username:
          type: ["string", "null"]
        expires_at:
          type: integer
        created_at:
          type: string
        quick_sell_value:
          type: integer

    MarketPage:
      type: object
      required: [listings, page, total, pages]
      properties:
        listings:
          type: array
          items:
            $ref: "#/components/schemas/MarketListing"
        page:
          type: integer
        total:
          type: integer
        pages:
          type: integer

    CreateListingInput:
      type: object
      required: [inventory_id, starting_bid, duration]
      properties:
        inventory_id:
          type: integer
        starting_bid:
          type: integer
        duration:
          type: string
          enum: ["1h", "2h", "6h", "12h", "24h"]

    PlaceBidInput:
      type: object
      required: [amount]
      properties:
        amount:
          type: integer

    DailyObjective:
      type: object
      required: [date, formation, next_reset_at, formations_pool, squad]
      properties:
        date:
          type: string
        formation:
          type: string
        next_reset_at:
          type: string
        formations_pool:
          type: array
          items:
            type: string
        squad:
          type: object
          properties:
            slots:
              type: array
              items:
                type: object
                additionalProperties: true
            team_ovr:
              type: ["integer", "null"]
